name: cleanip_scanner

on:
  schedule:
    - cron: '17 */12 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  scan:
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 55  # افزایش یافت
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # uvloop حذف شد - در GitHub Actions مشکل داشت
      
      - name: Run scanner
        env:
          SHARD: ${{ matrix.shard }}
        run: python main.py
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}
          path: results/
          if-no-files-found: warn
          retention-days: 1  # کاهش فضای ذخیره‌سازی

  merge:
    needs: scan
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # مهم برای push
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install orjson
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shard-*
          path: results/
          merge-multiple: true
      
      - name: Merge results
        run: python merger.py
      
      - name: Publish results
        run: python publish.py
      
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add output/ merged.json || true
          git diff --staged --quiet || git commit -m "Update scan results [skip ci]" || true
          git push || echo "No changes to push"
