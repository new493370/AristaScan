name: cleanip_scanner

on:
  schedule:
    - cron: '17 */12 * * *'

  workflow_dispatch:

jobs:
  scan:
    strategy:
      fail-fast: false
      matrix:
        shard: [0,1,2,3]

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: run scanner
        env:
          SHARD: ${{ matrix.shard }}
        run: python main.py

      - uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}
          path: results/

  merge:
    needs: scan

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install orjson

      - uses: actions/download-artifact@v4
        with:
          pattern: shard-*
          path: results/
          merge-multiple: true

      - run: python merger.py

      - run: python publish.py

      - name: push results
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "update results" || true
          git push
